# @package _global_

defaults:
  - _self_
  - models@_qwen_assistant: qwen_3_6_35B
  - models@_gemini_pro_assistant: gemini_3_1_pro_preview
  - models@meta_model: ministral_3_14B_instruct_2512
  - models@patient_model: gemini_3_1_flash_lite_preview

assistant_models:
  - ${_qwen_assistant}
  - ${_gemini_pro_assistant}

dataset_path: data/helpmed/dataset.csv
output_dir: results/helpmed_benchmark
n_runs: 20
max_turns: 3

patient_configs:

  - type: patients_with_personality
    params:
      h: [1, 2, 3]
      e: [1, 2, 3]
      x: [1, 2, 3]
      a: [1, 2, 3]
      c: [1, 2, 3]
      o: [1, 2, 3]
      level: [A, B, C]
