# Unified study config for the labeling app.
#
# realism: real-vs-simulated detection with content/style realism ratings
#   sources: patient subfolder names from results-dir; "real" is a valid entry
#   cases: list of conversation IDs
#   n_samples_per_case: for each case, sample this many sources without replacement
#
# personality: HEXACO personality trait recovery
#   patients: simulator subfolder names from results-dir
#   cases: list of conversation IDs to include; omit for all available

